name: Build APK

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No KEYSTORE_BASE64 secret set — release APK will be debug-signed (still installable)."
          fi

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Assemble release APK (sideload)
        env:
          VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_FILE: ${{ steps.keystore.outputs.present == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Bundle release AAB (Play upload)
        env:
          VERSION_CODE: ${{ github.run_number }}
          KEYSTORE_FILE: ${{ steps.keystore.outputs.present == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/ham-radio-wspr-txrx-${GITHUB_SHA::7}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/ham-radio-wspr-txrx-${GITHUB_SHA::7}-play.aab"
          ls -l dist

      - name: Upload APK artifact (sideload)
        uses: actions/upload-artifact@v4
        with:
          name: ham-radio-wspr-txrx-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact (Play upload)
        uses: actions/upload-artifact@v4
        with:
          name: ham-radio-wspr-txrx-play-aab
          path: dist/*.aab
          if-no-files-found: error

      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
